name: social_sage
description: Social Sage - Multi-platform social media management app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.2.0
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  image_picker: ^1.1.2
  file_picker: ^8.0.3
  flutter_local_notifications: ^17.2.1
  table_calendar: ^3.1.2
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  font_awesome_flutter: ^10.7.0
  shimmer: ^3.0.0
  uuid: ^4.4.2
  path_provider: ^2.1.3
  path: ^1.9.0
  sqflite: ^2.3.3+1
  workmanager: ^0.5.2
  flutter_web_auth_2: ^3.0.0
  http: ^1.2.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
